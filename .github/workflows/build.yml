name: Build SO Files

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
        arch: ['x86_64', 'aarch64']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        pip install cython setuptools requests
    
    - name: Build SO file
      run: |
        python setup.py build_ext --inplace
        PY_VER=${{ matrix.python-version }}
        ARCH=${{ matrix.arch }}
        PYTHON_ABI="cp$(echo $PY_VER | tr -d '.')"
        PLATFORM="linux-${ARCH}"
        ORIG_FILE=$(ls *.so 2>/dev/null | head -1)
        if [ -f "$ORIG_FILE" ]; then
          NEW_NAME="dcjz_core.${PYTHON_ABI}-${PLATFORM}.so"
          mv "$ORIG_FILE" "$NEW_NAME"
          mkdir -p dist
          cp "$NEW_NAME" dist/
        fi
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dcjz-so-${{ matrix.arch }}
        path: dist/*.so

    - name: Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*.so
