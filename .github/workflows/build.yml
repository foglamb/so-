name: Build SO Files

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [linux/amd64, linux/arm64]
    steps:
    - uses: actions/checkout@v4
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Build
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: ${{ matrix.arch }}
        push: false
        tags: build-${{ strategy.job-index }}
    - name: Compile SO in Alpine container
      run: |
        ARCH="${{ matrix.arch }}"
        if [ "$ARCH" = "linux/arm64" ]; then
          PLAT="aarch64"
        else
          PLAT="x86_64"
        fi
        
        docker run --rm --platform $ARCH           -v ${{ github.workspace }}:/work           -w /work           python:3.12-alpine           sh -c "
            apk add --no-cache gcc musl-dev python3-dev &&
            pip install cython setuptools requests --break-system-packages &&
            python setup.py build_ext --inplace &&
            ls -la *.so
          "
        
        ORIG=$(ls *.so 2>/dev/null | head -1)
        if [ -n "$ORIG" ]; then
          mkdir -p dist
          cp "$ORIG" "dist/dcjz_core.cp312-linux-${PLAT}.so"
        fi
    - uses: actions/upload-artifact@v4
      with:
        name: dcjz-so-${{ matrix.arch == 'linux/arm64' && 'aarch64' || 'x86_64' }}
        path: dist/*.so

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: dist
    - uses: softprops/action-gh-release@v1
      with:
        files: dist/**/*.so
