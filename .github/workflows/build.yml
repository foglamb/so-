name: Build SO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-aarch64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64
    - name: Build
      shell: bash
      run: |
        docker run --rm --platform linux/arm64 -v $PWD:/work -w /work python:3.12-alpine sh -c "apk add --no-cache gcc musl-dev python3-dev && pip install cython setuptools --break-system-packages && python setup.py build_ext --inplace"
        ORIG=$(ls *.so 2>/dev/null | head -1)
        mkdir -p dist
        cp "$ORIG" dist/dcjz_core.cp312-linux-aarch64.so
    - uses: actions/upload-artifact@v4
      with:
        name: so-aarch64
        path: dist/*.so

  build-x86_64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      shell: bash
      run: |
        docker run --rm -v $PWD:/work -w /work python:3.12-alpine sh -c "apk add --no-cache gcc musl-dev python3-dev && pip install cython setuptools --break-system-packages && python setup.py build_ext --inplace"
        ORIG=$(ls *.so 2>/dev/null | head -1)
        mkdir -p dist
        cp "$ORIG" dist/dcjz_core.cp312-linux-x86_64.so
    - uses: actions/upload-artifact@v4
      with:
        name: so-x86_64
        path: dist/*.so

  release:
    needs: [build-aarch64, build-x86_64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: dist
    - uses: softprops/action-gh-release@v1
      with:
        files: dist/**/*.so
